<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobPortal - Apply</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">Job<span>Portal</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="jobs.html">Jobs</a>
        <a href="applications.html" class="active">My Applications</a>
      </div>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <div class="card apply-form-wrap">
        <div id="applyHeader"></div>

        <form id="applicationForm">
          <div class="form-grid">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="fullName" placeholder="Enter full name" />
            </div>

            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="email" placeholder="Enter email address" />
            </div>

            <div class="form-group">
              <label>Phone Number</label>
              <input type="text" id="phone" placeholder="Enter phone number" />
            </div>

            <div class="form-group">
              <label>Location</label>
              <input type="text" id="location" placeholder="Enter your location" />
            </div>

            <div class="form-group full-width">
              <label>Cover Letter</label>
              <textarea id="coverLetter" placeholder="Write a short cover letter"></textarea>
            </div>

            <div class="form-group full-width">
              <label>Resume / CV Filename</label>
              <input type="file" id="cvName" placeholder="e.g. victor_resume.pdf" />
            </div>
          </div>

          <button class="btn btn-primary" type="submit">Submit Application</button>
        </form>

        <div id="formMessage" class="success-message hidden"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p><strong>JobPortal</strong> - Mini job board project</p>
      <p>&copy; 2026 JobPortal. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/jobs-data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/apply.js"></script>
</body>
</html>
